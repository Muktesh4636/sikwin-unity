# Nginx config for gunduata.club on the LB (187.77.186.84)
#
# If you see "Roll with Royalty" landing instead of the game site, Nginx is
# currently serving a different root. Point gunduata.club to our deploy:
#
# 1. SSH to LB:  ssh root@187.77.186.84
# 2. Find current config:  grep -r "gunduata.club" /etc/nginx/
# 3. Edit the file (e.g. /etc/nginx/sites-available/gunduata.club or default):
#    Set:  root /var/www/gunduata.club;
#    And:  location / { try_files $uri $uri/ /index.html; }
# 4. Test and reload:  nginx -t && systemctl reload nginx
#
# Or replace the server block for gunduata.club with the one below.

server {
    listen 80;
    listen [::]:80;
    server_name gunduata.club www.gunduata.club gunduata1.gunduata.club;

    # Static website (deploy output)
    root /var/www/gunduata.club;
    index index.html;

    # Django game admin — use ^~ so /game-admin is never caught by "location /game" (no trailing slash).
    location ^~ /game-admin {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to app servers (adjust upstream if needed)
    location /api/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Avoid premature timeouts when backends are slow or under load
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # WebSocket proxy (for Unity game real-time; backend must serve WS at /ws/ on same port as API, 8001)
    location /ws/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Optional: HTTPS (uncomment after getting certificate, e.g. certbot)
    # listen 443 ssl;
    # listen [::]:443 ssl;
    # ssl_certificate /etc/letsencrypt/live/gunduata.club/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gunduata.club/privkey.pem;
}

# Upstream for app servers (port 8001)
upstream app_backend {
    server 72.61.254.71:8001;
    server 72.61.254.74:8001;
    server 72.62.226.41:8001;
}
