# Snippet: add these location blocks INSIDE both server { } blocks (port 80 and 443),
# BEFORE "location /". Game files live in /var/www/gunduata.club/game/Build/ (not under root website/).
# Serve loader.js + uncompressed framework/data/wasm so Cloudflare cannot break them.

        # Unity WebGL loader (must be real JS, not index.html fallback)
        location = /game/Build/WebGL.loader.js {
            alias /var/www/gunduata.club/game/Build/WebGL.loader.js;
            default_type application/javascript;
        }
        # Unity WebGL: serve uncompressed (reliable behind Cloudflare)
        location = /game/Build/WebGL.framework.js {
            alias /var/www/gunduata.club/game/Build/WebGL.framework.js;
            default_type application/javascript;
        }
        location = /game/Build/WebGL.data {
            alias /var/www/gunduata.club/game/Build/WebGL.data;
            default_type application/octet-stream;
        }
        location = /game/Build/WebGL.wasm {
            alias /var/www/gunduata.club/game/Build/WebGL.wasm;
            default_type application/wasm;
        }
