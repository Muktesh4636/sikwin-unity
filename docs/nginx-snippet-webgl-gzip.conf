# Unity WebGL — extensionless URLs → precompressed .gz on disk
#
# Paste INSIDE server { }, BEFORE `location /` (SPA try_files). Game files live under
# /var/www/gunduata.club/{game,...}/Build/. Do not use `location /game` without a trailing
# slash — it matches /game-admin and breaks the Django game admin panel.
#
# Deploy only ships WebGL.*.gz; the player requests names without .gz. Alias + Content-Encoding:
# gzip so the browser decompresses (Cloudflare may strip the header but still serve decoded bytes).
# Without alias, you get 404 or index.html for framework.js → Unity load error.

        location ~* ^/(game|game-webgl-stable|game-webgl-previous)/Build/WebGL\.framework\.js$ {
            gzip off;
            alias /var/www/gunduata.club/$1/Build/WebGL.framework.js.gz;
            types { }
            default_type application/javascript;
            add_header Content-Encoding gzip always;
            add_header Cache-Control "no-transform, public, max-age=31536000" always;
        }
        location ~* ^/(game|game-webgl-stable|game-webgl-previous)/Build/WebGL\.wasm$ {
            gzip off;
            alias /var/www/gunduata.club/$1/Build/WebGL.wasm.gz;
            types { }
            default_type application/wasm;
            add_header Content-Encoding gzip always;
            add_header Cache-Control "no-transform, public, max-age=31536000" always;
        }
        location ~* ^/(game|game-webgl-stable|game-webgl-previous)/Build/WebGL\.data$ {
            gzip off;
            alias /var/www/gunduata.club/$1/Build/WebGL.data.gz;
            types { }
            default_type application/octet-stream;
            add_header Content-Encoding gzip always;
            add_header Cache-Control "no-transform, public, max-age=31536000" always;
        }

# Single-folder variant (only /game/) — same idea with location = and a fixed alias:
