# Paste inside each server { } for gunduata.club (HTTP + HTTPS), before `location /ws/` (same level as other locations).
# Without this, missing files under /game/StreamingAssets/ fall through to `try_files ... /index.html` and the browser
# receives the React app’s HTML — Unity then mis-parses it as assets (missing UI / “assets missing”).

location ^~ /game/StreamingAssets/ {
    try_files $uri =404;
    default_type application/octet-stream;
}
