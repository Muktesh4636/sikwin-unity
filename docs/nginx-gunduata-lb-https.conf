# Deploy to LB: /etc/nginx/conf.d/gunduata.club.conf
# Fixes Cloudflare 522 when SSL mode is Full: origin must listen on 443 with valid cert.
# HTTP :80 serves ACME challenges only, then redirects to HTTPS.

upstream app_backend {
    server 72.61.254.71:8001;
    server 72.61.254.74:8001;
    server 72.62.226.41:8001;
}

server {
    listen 80;
    listen [::]:80;
    server_name gunduata.club www.gunduata.club gunduata1.gunduata.club;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/gunduata.club;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gunduata.club www.gunduata.club gunduata1.gunduata.club;

    ssl_certificate /etc/letsencrypt/live/gunduata.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gunduata.club/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/gunduata.club;
    index index.html;

    # Django "Game Admin" — MUST use ^~ so it wins over any mistaken "location /game" (no slash),
    # which incorrectly matches /game-admin and serves Unity instead of the admin app.
    location ^~ /game-admin {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Unity WebGL: only under /game/Build/. Extensionless URL → .gz on disk + Content-Encoding: gzip.
    # Never use "location /game" without trailing semantics — that prefix also matches /game-admin, etc.
    location = /game/Build/WebGL.framework.js {
        gzip off;
        alias /var/www/gunduata.club/game/Build/WebGL.framework.js.gz;
        default_type application/javascript;
        add_header Content-Encoding gzip always;
        add_header Cache-Control "public, max-age=14400, no-transform" always;
    }
    location = /game/Build/WebGL.data {
        gzip off;
        alias /var/www/gunduata.club/game/Build/WebGL.data.gz;
        default_type application/octet-stream;
        add_header Content-Encoding gzip always;
        add_header Cache-Control "public, max-age=14400, no-transform" always;
    }
    location = /game/Build/WebGL.wasm {
        gzip off;
        alias /var/www/gunduata.club/game/Build/WebGL.wasm.gz;
        default_type application/wasm;
        add_header Content-Encoding gzip always;
        add_header Cache-Control "public, max-age=14400, no-transform" always;
    }

    location = /admin {
        return 301 /admin/;
    }
    location = /admin/ {
        root /var/www/gunduata.club;
        try_files /admin/index.html =404;
    }
    location ^~ /admin/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
