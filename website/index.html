<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script>
      (function() {
        var s = window.screen;
        var isMobile = s.width <= 768 || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0 && s.width < 1024);
        if (isMobile) {
          var w = Math.min(Math.max(s.width, 360), 430);
          var meta = document.querySelector('meta[name="viewport"]');
          if (meta) meta.setAttribute('content', 'width=' + w + ', initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="theme-color" content="#121212" />
    <title>Gundu Ata</title>
    <!-- WebGL lives at /game/index.html only — do not prefetch Unity assets here so the main app stays light -->
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var s = window.screen;
        var isMobile = s.width <= 768 || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0 && s.width < 1024);
        function setMobileViewport() {
          if (isMobile) {
            var w = Math.min(Math.max(s.width, 360), 430);
            var meta = document.querySelector('meta[name="viewport"]');
            if (meta) meta.setAttribute('content', 'width=' + w + ', initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover');
          }
        }
        setMobileViewport();
        window.addEventListener('resize', setMobileViewport);
        window.addEventListener('orientationchange', function() { setTimeout(setMobileViewport, 150); });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
