<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#121212" />
    <title>Admin — Gundu Ata</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: #121212;
        color: #e0e0e0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .hero {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem 3rem;
        text-align: center;
      }
      .hero-badge {
        font-size: clamp(2rem, 7vw, 3.25rem);
        font-weight: 800;
        color: #ffcc00;
        line-height: 1.15;
        letter-spacing: 0.02em;
        text-shadow: 0 0 40px rgba(255, 204, 0, 0.25);
      }
      .hero-badge + .hero-badge {
        margin-top: 0.35rem;
      }
      .actions {
        margin-top: 2rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        width: 100%;
        max-width: 280px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.9rem 1.25rem;
        border-radius: 0.875rem;
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        border: none;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      .btn:active {
        opacity: 0.92;
      }
      .btn-primary {
        background: #ffcc00;
        color: #121212;
      }
      .btn-secondary {
        background: #1e1e1e;
        color: #ffcc00;
        border: 2px solid #ffcc00;
      }
      .back {
        margin-top: 2.5rem;
        font-size: 0.9rem;
      }
      .back a {
        color: #9e9e9e;
        text-decoration: none;
      }
      .back a:hover {
        color: #ffcc00;
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <h1 class="hero-badge">Take Franchise</h1>
      <p class="hero-badge">Access admin panel</p>
      <div class="actions">
        <a class="btn btn-primary" href="/admin/login/?next=/admin/">Access admin panel</a>
        <a class="btn btn-secondary" href="/partner/">Take franchise</a>
      </div>
      <p class="back"><a href="/">← Back to game</a></p>
    </main>
  </body>
</html>
